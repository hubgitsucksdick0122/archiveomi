<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArchiveOMI — File Hosting</title>
  <style>
    /* ── Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d0f;
      --surface:  #18181c;
      --card:     #1f1f26;
      --border:   #2e2e3a;
      --accent:   #b06aff;
      --accent2:  #ff6aab;
      --text:     #e8e8f0;
      --muted:    #7a7a99;
      --radius:   12px;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Header ───────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      height: 60px;
    }
    header .logo {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header nav {
      margin-left: auto;
      display: flex;
      gap: .75rem;
    }
    header nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: .875rem;
      transition: color .2s;
    }
    header nav a:hover { color: var(--text); }

    /* ── Main ─────────────────────────────────────────────── */
    main {
      max-width: 960px;
      margin: 2.5rem auto;
      padding: 0 1.25rem;
    }

    /* ── Drop zone ────────────────────────────────────────── */
    #drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
      overflow: hidden;
    }
    #drop-zone.drag-over {
      border-color: var(--accent);
      background: #1a1025;
    }
    #drop-zone .drop-icon {
      font-size: 3rem;
      margin-bottom: .75rem;
      display: block;
    }
    #drop-zone h2 { font-size: 1.2rem; margin-bottom: .4rem; }
    #drop-zone p  { color: var(--muted); font-size: .875rem; }
    .btn {
      display: inline-block;
      margin-top: 1.1rem;
      padding: .55rem 1.4rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: .875rem;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      transition: opacity .2s, transform .1s;
    }
    .btn:hover  { opacity: .88; }
    .btn:active { transform: scale(.97); }

    /* ── Gallery ──────────────────────────────────────────── */
    #gallery-wrap { margin-top: 2.5rem; }
    #gallery-wrap h3 {
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 1rem;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
    }

    /* ── Cards ────────────────────────────────────────────── */
    .file-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform .18s, box-shadow .18s;
      position: relative;
    }
    .file-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(176,106,255,.18);
    }
    .file-card .thumb {
      width: 100%; height: 120px;
      object-fit: cover;
      display: block;
      background: var(--surface);
    }
    .file-card .thumb-icon {
      width: 100%; height: 120px;
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
      background: var(--surface);
    }
    .file-card .info {
      padding: .6rem .75rem;
    }
    .file-card .info .name {
      font-size: .8rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: .25rem;
    }
    .file-card .info .size {
      font-size: .72rem;
      color: var(--muted);
    }
    .file-card .copy-btn {
      position: absolute;
      top: .4rem; right: .4rem;
      background: rgba(0,0,0,.55);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: .3rem .55rem;
      font-size: .72rem;
      cursor: pointer;
      opacity: 0;
      transition: opacity .15s;
    }
    .file-card:hover .copy-btn { opacity: 1; }
    .file-card .copy-btn:hover { background: var(--accent); }
    .file-card .del-btn {
      position: absolute;
      top: .4rem; left: .4rem;
      background: rgba(0,0,0,.55);
      color: #ff5f5f;
      border: none;
      border-radius: 6px;
      padding: .3rem .55rem;
      font-size: .72rem;
      cursor: pointer;
      opacity: 0;
      transition: opacity .15s;
    }
    .file-card:hover .del-btn { opacity: 1; }

    /* ── Empty state ──────────────────────────────────────── */
    #empty {
      text-align: center;
      color: var(--muted);
      padding: 2rem 0;
      font-size: .9rem;
    }

    /* ── Modal ────────────────────────────────────────────── */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.82);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }
    #modal-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 88vw;
      max-height: 90vh;
      overflow: auto;
      padding: 1.5rem;
      position: relative;
      min-width: 320px;
    }
    #modal-close {
      position: absolute; top: .75rem; right: .9rem;
      background: none; border: none;
      font-size: 1.4rem; color: var(--muted); cursor: pointer;
    }
    #modal-close:hover { color: var(--text); }
    #modal-title {
      font-size: 1rem; font-weight: 600;
      margin-bottom: 1rem;
      word-break: break-all;
      padding-right: 2rem;
    }
    #modal-content img,
    #modal-content video {
      display: block; max-width: 100%; max-height: 60vh;
      border-radius: 8px;
    }
    #modal-content audio {
      display: block; width: 100%; margin-top: .5rem;
    }
    #modal-content iframe {
      display: block; width: 100%; height: 60vh;
      border: none; border-radius: 8px;
    }
    #modal-content pre {
      background: var(--bg);
      border-radius: 8px;
      padding: 1rem;
      overflow: auto;
      max-height: 55vh;
      font-size: .78rem;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #modal-content .no-preview {
      text-align: center;
      padding: 2rem 0;
      color: var(--muted);
    }
    #modal-content .no-preview span { font-size: 4rem; display: block; margin-bottom: .75rem; }
    #modal-actions {
      display: flex; gap: .75rem; margin-top: 1.1rem; flex-wrap: wrap;
    }
    #modal-actions a, #modal-actions button {
      padding: .5rem 1.1rem;
      border-radius: 8px;
      border: none;
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity .2s;
    }
    #modal-actions a { background: var(--accent); color: #fff; }
    #modal-actions button { background: var(--surface); color: var(--text); }
    #modal-actions a:hover, #modal-actions button:hover { opacity: .8; }

    /* ── Toast ────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 5.5rem; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--accent);
      color: #fff;
      padding: .55rem 1.4rem;
      border-radius: 100px;
      font-size: .85rem;
      font-weight: 600;
      pointer-events: none;
      opacity: 0;
      transition: opacity .25s, transform .25s;
      z-index: 200;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Anime girl widget ────────────────────────────────── */
    #anime-girl {
      position: fixed;
      bottom: 1.2rem;
      right: 1.4rem;
      z-index: 50;
      width: 90px;
      height: 90px;
      cursor: pointer;
      user-select: none;
    }
    #anime-girl svg {
      width: 100%;
      height: 100%;
      animation: spin3d 8s linear infinite;
      filter: drop-shadow(0 0 10px rgba(176,106,255,.7));
    }
    @keyframes spin3d {
      0%   { transform: rotateY(0deg);   }
      50%  { transform: rotateY(180deg); }
      100% { transform: rotateY(360deg); }
    }

    /* ── Footer ───────────────────────────────────────────── */
    footer {
      text-align: center;
      color: var(--muted);
      font-size: .78rem;
      padding: 2.5rem 1rem;
    }
  </style>
</head>
<body>

<!-- ── Header ───────────────────────────────────────────── -->
<header>
  <span class="logo">ArchiveOMI</span>
  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
  </nav>
</header>

<!-- ── Main ─────────────────────────────────────────────── -->
<main>
  <!-- Upload zone -->
  <div id="drop-zone">
    <span class="drop-icon">📂</span>
    <h2>Drop files here</h2>
    <p>or click to browse your device</p>
    <label for="file-input" class="btn">Choose files</label>
    <input type="file" id="file-input" multiple style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;" />
  </div>

  <!-- Gallery -->
  <div id="gallery-wrap">
    <h3>Your files</h3>
    <div id="gallery">
      <div id="empty">No files uploaded yet.</div>
    </div>
  </div>
</main>

<!-- ── Modal ─────────────────────────────────────────────── -->
<div id="modal-overlay" role="dialog" aria-modal="true">
  <div id="modal-box">
    <button id="modal-close" title="Close">✕</button>
    <div id="modal-title"></div>
    <div id="modal-content"></div>
    <div id="modal-actions"></div>
  </div>
</div>

<!-- ── Toast ─────────────────────────────────────────────── -->
<div id="toast">Copied to clipboard!</div>

<!-- ── Anime girl (rotating) ─────────────────────────────── -->
<div id="anime-girl" title="(＾▽＾)">
  <!-- Inline SVG anime girl -->
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">
    <!-- Glow ring -->
    <circle cx="50" cy="50" r="46" stroke="#b06aff" stroke-width="2.5" stroke-dasharray="6 4" opacity=".6"/>

    <!-- Body / dress -->
    <ellipse cx="50" cy="78" rx="22" ry="18" fill="#ff6aab"/>
    <rect x="33" y="62" width="34" height="24" rx="8" fill="#ff6aab"/>

    <!-- Arms -->
    <ellipse cx="30" cy="73" rx="6" ry="9" fill="#fce4ec" transform="rotate(-15 30 73)"/>
    <ellipse cx="70" cy="73" rx="6" ry="9" fill="#fce4ec" transform="rotate(15 70 73)"/>

    <!-- Neck -->
    <rect x="46" y="53" width="8" height="9" rx="3" fill="#fce4ec"/>

    <!-- Head -->
    <ellipse cx="50" cy="46" rx="17" ry="18" fill="#fce4ec"/>

    <!-- Hair back -->
    <ellipse cx="50" cy="35" rx="18" ry="13" fill="#7c3aed"/>
    <!-- Hair side left -->
    <ellipse cx="34" cy="48" rx="6" ry="14" fill="#7c3aed" transform="rotate(-8 34 48)"/>
    <!-- Hair side right -->
    <ellipse cx="66" cy="48" rx="6" ry="14" fill="#7c3aed" transform="rotate(8 66 48)"/>
    <!-- Hair front fringe -->
    <path d="M33 38 Q50 28 67 38 Q60 30 50 29 Q40 30 33 38Z" fill="#6d28d9"/>

    <!-- Eyes (sparkly) -->
    <ellipse cx="43" cy="47" rx="4" ry="4.5" fill="#1e1b4b"/>
    <ellipse cx="57" cy="47" rx="4" ry="4.5" fill="#1e1b4b"/>
    <!-- Eye shine -->
    <circle cx="44.5" cy="45.5" r="1.2" fill="#fff"/>
    <circle cx="58.5" cy="45.5" r="1.2" fill="#fff"/>
    <!-- Iris color -->
    <circle cx="43" cy="47.5" r="2.2" fill="#818cf8"/>
    <circle cx="57" cy="47.5" r="2.2" fill="#818cf8"/>

    <!-- Blush -->
    <ellipse cx="38" cy="52" rx="4" ry="2.2" fill="#ffb7c5" opacity=".65"/>
    <ellipse cx="62" cy="52" rx="4" ry="2.2" fill="#ffb7c5" opacity=".65"/>

    <!-- Nose -->
    <path d="M49 52 Q50 53.5 51 52" stroke="#e0a0b0" stroke-width=".9" stroke-linecap="round"/>

    <!-- Smile -->
    <path d="M45 55 Q50 59 55 55" stroke="#c2617a" stroke-width="1.1" stroke-linecap="round"/>

    <!-- Bow on hair -->
    <path d="M44 32 Q50 27 56 32 Q50 36 44 32Z" fill="#ff6aab"/>
    <circle cx="50" cy="32" r="2.5" fill="#fff"/>

    <!-- Dress collar / detail -->
    <path d="M44 62 Q50 68 56 62" stroke="#fff" stroke-width="1.2" fill="none" opacity=".7"/>
  </svg>
</div>

<!-- ── Footer ─────────────────────────────────────────────── -->
<footer>
  ArchiveOMI &mdash; free file hosting &hearts;
</footer>

<script>
/* ─────────────────────────────────────────────────────────────
   ArchiveOMI — main script
   Files are kept in memory as { id, file, url, name, size, type }
───────────────────────────────────────────────────────────────*/

const fileInput   = document.getElementById('file-input');
const dropZone    = document.getElementById('drop-zone');
const gallery     = document.getElementById('gallery');
const emptyMsg    = document.getElementById('empty');
const overlay     = document.getElementById('modal-overlay');
const modalTitle  = document.getElementById('modal-title');
const modalContent= document.getElementById('modal-content');
const modalActions= document.getElementById('modal-actions');
const modalClose  = document.getElementById('modal-close');
const toast       = document.getElementById('toast');

let files = [];   // in-memory store
let toastTimer;

/* ── Helpers ───────────────────────────────────────────────── */
function formatSize(bytes) {
  if (bytes < 1024)       return bytes + ' B';
  if (bytes < 1048576)    return (bytes / 1024).toFixed(1) + ' KB';
  if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
  return (bytes / 1073741824).toFixed(2) + ' GB';
}

function uid() {
  return Math.random().toString(36).slice(2, 10);
}

function showToast(msg = 'Copied!') {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
}

function fileIcon(type) {
  if (type.startsWith('image/'))     return '🖼️';
  if (type.startsWith('video/'))     return '🎬';
  if (type.startsWith('audio/'))     return '🎵';
  if (type === 'application/pdf')    return '📄';
  if (type.startsWith('text/'))      return '📝';
  if (type.includes('zip') || type.includes('archive') || type.includes('tar') || type.includes('gz')) return '🗜️';
  return '📎';
}

/* ── Upload ────────────────────────────────────────────────── */
function handleFiles(fileList) {
  for (const f of fileList) {
    const url = URL.createObjectURL(f);
    files.push({ id: uid(), file: f, url, name: f.name, size: f.size, type: f.type });
  }
  renderGallery();
}

fileInput.addEventListener('change', () => handleFiles(fileInput.files));

dropZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
});

/* ── Gallery ───────────────────────────────────────────────── */
function renderGallery() {
  gallery.innerHTML = '';

  if (files.length === 0) {
    gallery.appendChild(emptyMsg);
    return;
  }

  files.forEach((entry) => {
    const card = document.createElement('div');
    card.className = 'file-card';

    // Thumbnail / icon
    if (entry.type.startsWith('image/')) {
      const img = document.createElement('img');
      img.className = 'thumb';
      img.src = entry.url;
      img.alt = entry.name;
      card.appendChild(img);
    } else {
      const ic = document.createElement('div');
      ic.className = 'thumb-icon';
      ic.textContent = fileIcon(entry.type);
      card.appendChild(ic);
    }

    // Info
    const info = document.createElement('div');
    info.className = 'info';
    info.innerHTML = `<div class="name" title="${entry.name}">${entry.name}</div>
                      <div class="size">${formatSize(entry.size)}</div>`;
    card.appendChild(info);

    // Copy button
    const copyBtn = document.createElement('button');
    copyBtn.className = 'copy-btn';
    copyBtn.textContent = '🔗 Copy';
    copyBtn.title = 'Copy link';
    copyBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      navigator.clipboard.writeText(entry.url).then(() => showToast('Link copied!')).catch(() => {
        // fallback
        const ta = document.createElement('textarea');
        ta.value = entry.url;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('Link copied!');
      });
    });
    card.appendChild(copyBtn);

    // Delete button
    const delBtn = document.createElement('button');
    delBtn.className = 'del-btn';
    delBtn.textContent = '✕';
    delBtn.title = 'Delete';
    delBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      URL.revokeObjectURL(entry.url);
      files = files.filter(f => f.id !== entry.id);
      renderGallery();
    });
    card.appendChild(delBtn);

    // Open modal on card click
    card.addEventListener('click', () => openModal(entry));

    gallery.appendChild(card);
  });
}

/* ── Modal ─────────────────────────────────────────────────── */
function openModal(entry) {
  modalTitle.textContent = entry.name;
  modalContent.innerHTML = '';
  modalActions.innerHTML = '';

  const type = entry.type;

  if (type.startsWith('image/')) {
    const img = document.createElement('img');
    img.src = entry.url;
    img.alt = entry.name;
    modalContent.appendChild(img);

  } else if (type.startsWith('video/')) {
    const vid = document.createElement('video');
    vid.src = entry.url;
    vid.controls = true;
    modalContent.appendChild(vid);

  } else if (type.startsWith('audio/')) {
    const icon = document.createElement('div');
    icon.style.textAlign = 'center';
    icon.style.fontSize = '4rem';
    icon.style.padding = '1rem 0';
    icon.textContent = '🎵';
    const aud = document.createElement('audio');
    aud.src = entry.url;
    aud.controls = true;
    modalContent.appendChild(icon);
    modalContent.appendChild(aud);

  } else if (type === 'application/pdf') {
    const frame = document.createElement('iframe');
    frame.src = entry.url;
    frame.title = entry.name;
    modalContent.appendChild(frame);

  } else if (type.startsWith('text/') || isTextExtension(entry.name)) {
    const reader = new FileReader();
    reader.onload = (e) => {
      const pre = document.createElement('pre');
      pre.textContent = e.target.result;
      modalContent.appendChild(pre);
    };
    reader.readAsText(entry.file);

  } else {
    const noPreview = document.createElement('div');
    noPreview.className = 'no-preview';
    noPreview.innerHTML = `<span>${fileIcon(type)}</span>No preview available`;
    modalContent.appendChild(noPreview);
  }

  // Download button
  const dlBtn = document.createElement('a');
  dlBtn.href = entry.url;
  dlBtn.download = entry.name;
  dlBtn.textContent = '⬇ Download';
  modalActions.appendChild(dlBtn);

  // Copy link button
  const cpBtn = document.createElement('button');
  cpBtn.textContent = '🔗 Copy link';
  cpBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(entry.url).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = entry.url;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    });
    showToast('Link copied!');
  });
  modalActions.appendChild(cpBtn);

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  overlay.classList.remove('open');
  document.body.style.overflow = '';
  // stop any playing media
  modalContent.querySelectorAll('video, audio').forEach(m => m.pause());
}

modalClose.addEventListener('click', closeModal);
overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

function isTextExtension(name) {
  const ext = name.split('.').pop().toLowerCase();
  return ['txt','md','json','js','ts','css','html','htm','xml','csv','py','rb','go',
          'java','c','cpp','h','rs','sh','yaml','yml','toml','ini','conf'].includes(ext);
}

/* ── Anime-girl easter egg ──────────────────────────────────── */
document.getElementById('anime-girl').addEventListener('click', () => {
  showToast('(＾▽＾) kawaii~');
});

/* ── Init ──────────────────────────────────────────────────── */
renderGallery();
</script>
</body>
</html>
